server {
    listen 80;
    root /usr/share/nginx/html;

    location = /mcp {
        proxy_pass http://mcp:8080/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    location /preview/ {
        proxy_pass http://mcp:8080/preview/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /export/ {
        proxy_pass http://mcp:8080/export/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /debug/ {
        proxy_pass http://mcp:8080/debug/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri /index.html;
    }
}
